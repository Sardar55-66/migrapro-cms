<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Админка — МИГРАПРО</title>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>
  <script>
    (function() {
      var siteUrl = window.location.origin + '/';
      var createClass = window.CMS?.createClass || window.createClass;
      var h = window.h || (window.CMS && window.CMS.h);
      if (createClass && h) {
        var IframePreview = createClass({
          render: function() {
            return h('div', { style: { width: '100%', height: '100%', overflow: 'auto', minHeight: '1200px' } },
              h('iframe', {
                src: siteUrl,
                style: { width: '100%', minHeight: '3000px', height: '3000px', border: 'none', display: 'block' },
                title: 'Превью сайта'
              })
            );
          }
        });
        window.CMS.registerPreviewTemplate('home', IframePreview);
      }
    })();
  </script>
</body>
</html>
